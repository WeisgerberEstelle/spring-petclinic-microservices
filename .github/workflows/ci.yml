name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_job:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:17-jdk-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: build-${{ hashFiles('**/pom.xml') }}
      - name: Compile
        run: >
          ./mvnw compile
          -Dhttps.protocols=TLSv1.2
          -Dmaven.repo.local=${{ github.workspace }}/.m2/repository
          -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
          -Dorg.slf4j.simpleLogger.showDateTime=true
          -Djava.awt.headless=true
          --batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true

  test_job:
    name: Test
    needs: build_job
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:17-jdk-alpine
    steps:
      - uses: actions/checkout@v4
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: test-${{ hashFiles('**/pom.xml') }}
      - name: Test
        run: >
          ./mvnw test
          -Dhttps.protocols=TLSv1.2
          -Dmaven.repo.local=${{ github.workspace }}/.m2/repository
          -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
          -Dorg.slf4j.simpleLogger.showDateTime=true
          -Djava.awt.headless=true
          --batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true

  create_issue_on_failure:
    name: Create issue on failure
    runs-on: ubuntu-latest
    needs: [build_job, test_job]
    if: failure()
    steps:
      - name: Create issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ CI Pipeline failed on ${context.ref}`,
              body: `Le pipeline a échoué.\n\n**Branche:** ${context.ref}\n**Commit:** ${context.sha}\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug']
            })